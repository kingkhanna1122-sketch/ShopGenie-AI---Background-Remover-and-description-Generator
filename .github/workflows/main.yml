name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --force

      - name: Build Web App
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}

      - name: Setup App Assets (Beautiful Icons)
        run: |
          mkdir -p assets
          curl -L "https://picsum.photos/seed/shopgenie-vibrant-app/1024/1024" -o assets/icon-only.png
          curl -L "https://picsum.photos/seed/shopgenie-foreground/1024/1024" -o assets/icon-foreground.png
          curl -L "https://picsum.photos/seed/shopgenie-background/1024/1024" -o assets/icon-background.png
          curl -L "https://picsum.photos/seed/shopgenie-splash-vibrant/2732/2732" -o assets/splash.png
          curl -L "https://picsum.photos/seed/shopgenie-splash-dark/2732/2732" -o assets/splash-dark.png
          npm install @capacitor/assets@latest --no-save
          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopgenie-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
